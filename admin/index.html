<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>어드민 - 대나무숲</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0A0F0D;
      color: #EAEAEA;
      min-height: 100vh;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 48px;
      padding-top: 40px;
    }
    .header-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .header h1 {
      color: #4CAF50;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .header p {
      color: #9E9E9E;
      font-size: 14px;
    }
    .card-grid {
      display: grid;
      gap: 14px;
    }
    .card {
      background: #141A17;
      border-radius: 16px;
      padding: 22px 20px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s, background 0.15s;
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }
    .card:hover {
      transform: translateY(-2px);
      background: #1A2420;
    }
    .card:active {
      transform: scale(0.98);
    }
    .card-icon {
      font-size: 28px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .card-body {
      flex: 1;
      min-width: 0;
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-desc {
      font-size: 13px;
      color: #9E9E9E;
      line-height: 1.5;
    }
    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 6px;
    }
    .badge-new {
      background: #4CAF50;
      color: #0A0F0D;
    }
    .badge-soon {
      background: #333;
      color: #888;
    }
    .card-arrow {
      color: #555;
      font-size: 18px;
      flex-shrink: 0;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-icon">🎋</div>
      <h1>대나무숲 어드민</h1>
      <p>관리 도구</p>
    </div>
    <div class="card-grid">
      <a href="bamboo/" class="card">
        <div class="card-icon">🌿</div>
        <div class="card-body">
          <div class="card-title">대나무숲 관리 <span class="badge badge-new">NEW</span></div>
          <div class="card-desc">AI 자동 글 생성, 수동 글 올리기, 자동 포스팅 설정</div>
        </div>
        <div class="card-arrow">›</div>
      </a>
      <a href="https://claypark.github.io/dev-page/admin/" class="card" target="_blank">
        <div class="card-icon">🔔</div>
        <div class="card-body">
          <div class="card-title">푸시 알림 관리</div>
          <div class="card-desc">푸시 알림 발송, 예약, 앱 관리</div>
        </div>
        <div class="card-arrow">›</div>
      </a>
    </div>
  </div>
</body>
</html>
